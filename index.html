<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f6f4ee;
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:16px;
}

/* ヘッダー */
.header{
  background:#111;
  color:#fff;
  padding:20px;
  border-radius:20px;
  margin-bottom:16px;
}

.header small{
  color:#ffd95c;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:12px;
  text-align:center;
  border:1px solid #ddd;
  border-radius:10px;
}

.selected{
  background:#ffd95c;
  font-weight:bold;
}

/* ボタン */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  font-size:16px;
}

.btn-main{
  background:#111;
  color:#fff;
}

.btn-sub{
  background:#ffd95c;
}

/* チップ */
.chip{
  display:inline-block;
  padding:6px 10px;
  margin:4px;
  border-radius:20px;
  background:#fff4c7;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
  <small>シフト希望</small>
  <h2>シフト提出</h2>
</div>

<div id="input" class="card">

<div class="calendar" id="calendar"></div>

<div id="selected"></div>

<textarea id="note" placeholder="備考"></textarea>

<button class="btn btn-main" onclick="submit()">送信</button>

</div>

<div id="view" class="card hidden">
<h3>送信完了</h3>
<div id="viewDates"></div>
<div id="viewNote"></div>
<button class="btn btn-sub" onclick="edit()">変更</button>
</div>

</div>

<script>
let selected=[];

function build(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';

  for(let i=1;i<=31;i++){
    const d=document.createElement('div');
    d.className='day';
    d.innerText=i;

    if(selected.includes(i)) d.classList.add('selected');

    d.onclick=()=>{
      if(selected.includes(i)){
        selected=selected.filter(v=>v!==i);
      }else{
        selected.push(i);
      }
      render();
    };

    cal.appendChild(d);
  }
}

function render(){
  build();
  const el=document.getElementById('selected');
  el.innerHTML='';

  selected.forEach(d=>{
    el.innerHTML+=`<span class="chip">${d}日</span>`;
  });
}

async function submit(){
  await fetch('/api/shift',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:'submitShift',
      userId:'demo-user-001',
      selectedDates:selected,
      note:document.getElementById('note').value
    })
  });

  document.getElementById('input').classList.add('hidden');
  document.getElementById('view').classList.remove('hidden');

  document.getElementById('viewDates').innerHTML =
    selected.map(d=>`${d}日`).join(',');

  document.getElementById('viewNote').innerText =
    document.getElementById('note').value;
}

function edit(){
  document.getElementById('input').classList.remove('hidden');
  document.getElementById('view').classList.add('hidden');
}

build();
</script>

</body>
</html>
