<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHIFT-NEW-999</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#ff2d8a;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    }
    .box{
      text-align:center;
      background:#111;
      padding:32px;
      border-radius:24px;
      box-shadow:0 20px 40px rgba(0,0,0,.25);
    }
    h1{
      font-size:42px;
      margin:0 0 12px;
    }
    p{
      font-size:20px;
      margin:0;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>NEW DESIGN 999</h1>
    <p>これが出れば反映先は正しいです</p>
  </div>
</body>
</html>
