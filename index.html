<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>シフト希望</title>
<style>
:root{
  --bg:#f6f4ee;
  --text:#222;
  --muted:#666;
  --panel:#fff;
  --line:#ddd;
  --line-soft:#eee;
  --brand:#111;
  --accent:#ffd95c;
  --accent-deep:#e0b93d;
  --accent-soft:#fff4c7;
  --success-bg:#eef8ef;
  --success-line:#b9dcbd;
  --success-text:#1f5f2a;
  --info-bg:#fff6dc;
  --info-line:#f0dfaa;
  --danger:#b3261e;
  --sun:#d04a3a;
  --sat:#3f72c8;
  --shadow-lg:0 10px 25px rgba(0,0,0,.12);
  --shadow-md:0 10px 25px rgba(0,0,0,.08);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.header{
  background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);
  color:#fff;
  padding:20px;
  border-radius:20px;
  margin-bottom:16px;
  box-shadow:var(--shadow-lg);
}

.header small{
  color:var(--accent);
  display:block;
  margin-bottom:6px;
  font-weight:700;
  letter-spacing:.02em;
}

.card{
  background:var(--panel);
  border-radius:20px;
  padding:16px;
  box-shadow:var(--shadow-md);
}

.hidden{display:none !important;}

.fade-in{
  animation:fadeIn .28s ease both;
}

.pop-in{
  animation:popIn .28s ease both;
}

.shake{
  animation:shake .26s ease both;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes popIn{
  0%{opacity:0; transform:scale(.98) translateY(6px);}
  100%{opacity:1; transform:scale(1) translateY(0);}
}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-4px);}
  75%{transform:translateX(4px);}
}

.label{
  font-size:14px;
  font-weight:700;
  margin:10px 0 8px;
}

input, textarea{
  width:100%;
  box-sizing:border-box;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  font-size:16px;
  margin-bottom:10px;
  background:#fff;
  transition:border-color .15s ease, box-shadow .15s ease;
}

input:focus, textarea:focus{
  outline:none;
  border-color:#c8c8c8;
  box-shadow:0 0 0 4px rgba(0,0,0,.04);
}

textarea{
  min-height:100px;
  resize:vertical;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  font-size:16px;
  font-weight:700;
  transition:transform .08s ease, opacity .12s ease, filter .12s ease;
  position:relative;
}

.btn:active{
  transform:scale(.99);
}

.btn[disabled]{
  opacity:.72;
  cursor:not-allowed;
  filter:saturate(.9);
}

.main{background:#111;color:#fff;}
.sub{background:#ffd95c;color:#111;}

.info{
  background:var(--info-bg);
  border:1px solid var(--info-line);
  padding:12px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
  margin-bottom:12px;
}

.success{
  background:var(--success-bg);
  border:1px solid var(--success-line);
  color:var(--success-text);
  padding:12px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
  margin-bottom:12px;
  font-weight:700;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:12px;
}

.week{
  text-align:center;
  font-size:11px;
  color:#777;
  font-weight:700;
  padding-bottom:2px;
}

.week.sun{ color:var(--sun); }
.week.sat{ color:var(--sat); }

.day{
  min-height:64px;
  padding:8px 4px;
  text-align:center;
  border:1px solid var(--line);
  border-radius:12px;
  cursor:pointer;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
  user-select:none;
}

.day:hover{
  box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.day:active{
  transform:scale(.98);
}

.day.blank{
  border:none;
  background:transparent;
  box-shadow:none;
  cursor:default;
  min-height:64px;
}

.day .num{
  font-size:15px;
  font-weight:700;
  line-height:1.1;
}

.day .dow{
  font-size:10px;
  color:#888;
  margin-top:4px;
  line-height:1;
}

.day.sun .num,
.day.sun .dow{
  color:var(--sun);
}

.day.sat .num,
.day.sat .dow{
  color:var(--sat);
}

.day.today{
  border-color:#cfcfcf;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
}

.day.selected{
  background:linear-gradient(180deg,#ffe78a 0%, #ffd95c 100%);
  font-weight:bold;
  border-color:var(--accent-deep);
  box-shadow:0 8px 16px rgba(224,185,61,.24);
}

.day.selected .num,
.day.selected .dow{
  color:#5f4b00 !important;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.chip{
  display:inline-block;
  padding:7px 10px;
  border-radius:999px;
  background:var(--accent-soft);
  font-size:13px;
  border:1px solid #f0df9d;
}

.error{
  color:var(--danger);
  font-size:14px;
  margin-top:10px;
  white-space:pre-wrap;
}

.muted{
  color:var(--muted);
  font-size:14px;
}

.box{
  border:1px solid var(--line-soft);
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  background:#fafafa;
}

.loading-overlay{
  position:fixed;
  inset:0;
  background:rgba(246,244,238,.78);
  backdrop-filter:blur(4px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease;
}

.loading-overlay.show{
  opacity:1;
  pointer-events:auto;
}

.loading-box{
  background:#fff;
  border-radius:18px;
  padding:18px 20px;
  box-shadow:0 12px 28px rgba(0,0,0,.1);
  text-align:center;
  min-width:180px;
}

.spinner{
  width:30px;
  height:30px;
  border:3px solid #ece7db;
  border-top-color:#111;
  border-radius:50%;
  margin:0 auto 12px;
  animation:spin .8s linear infinite;
}

.loading-text{
  font-size:14px;
  color:#444;
  font-weight:700;
}

.loading-sub{
  font-size:12px;
  color:#777;
  margin-top:6px;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.toast{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%) translateY(20px);
  background:#111;
  color:#fff;
  padding:12px 14px;
  border-radius:999px;
  font-size:13px;
  box-shadow:0 10px 20px rgba(0,0,0,.18);
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
  z-index:1000;
  max-width:calc(100vw - 32px);
  text-align:center;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@media (max-width:380px){
  .wrap{
    padding:12px;
  }
  .day{
    min-height:58px;
  }
  .day.blank{
    min-height:58px;
  }
  .day .num{
    font-size:14px;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <small>シフト希望</small>
    <h2 id="title" style="margin:0 0 6px;">読み込み中...</h2>
    <div id="subtitle" style="font-size:14px;color:rgba(255,255,255,.7);">確認しています...</div>
  </div>

  <!-- 本人確認 -->
  <div id="bind" class="card hidden">
    <div class="info">
      初回のみ本人確認をしてください。<br>
      一度紐づけば、次回からは自動で提出内容を表示します。
    </div>

    <div class="label">氏名</div>
    <input id="name" placeholder="名前">

    <div class="label">PIN</div>
    <input id="pin" placeholder="PIN" inputmode="numeric">

    <button id="bindBtn" class="btn main" onclick="bindUser()">本人確認して開始</button>
    <div id="bindError" class="error"></div>
  </div>

  <!-- 入力 -->
  <div id="input" class="card hidden">
    <div class="label">休みたい日を選択</div>
    <div id="calendar" class="calendar"></div>

    <div class="label" style="margin-top:16px;">選択中</div>
    <div id="selected" class="chips"></div>

    <div class="label" style="margin-top:16px;">備考（任意）</div>
    <textarea id="note" placeholder="備考"></textarea>

    <button id="submitBtn" class="btn main" onclick="submitShift()">送信</button>
    <div id="submitError" class="error"></div>
  </div>

  <!-- 確認 -->
  <div id="view" class="card hidden">
    <div id="successBanner" class="success hidden">送信が完了しました。</div>

    <div class="success">送信済みです。内容を確認できます。</div>

    <div class="box">
      <div class="muted">対象月</div>
      <div id="viewMonth"></div>
    </div>

    <div class="box">
      <div class="muted">休み希望日</div>
      <div id="viewDates" class="chips"></div>
    </div>

    <div class="box">
      <div class="muted">備考</div>
      <div id="viewNote"></div>
    </div>

    <button class="btn sub" onclick="editShift()">変更する</button>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loadingText" class="loading-text">処理中...</div>
    <div id="loadingSub" class="loading-sub">しばらくお待ちください</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = '/api/shift';
const USER = 'demo-user-001';
const DAYS = ['日','月','火','水','木','金','土'];

let selected = [];
let currentData = null;
let targetMonth = '';
let isSubmitting = false;
let isBinding = false;

function show(id){
  ['bind','input','view'].forEach(v=>{
    const el = document.getElementById(v);
    el.classList.add('hidden');
    el.classList.remove('fade-in');
  });
  const target = document.getElementById(id);
  target.classList.remove('hidden');
  target.classList.add('fade-in');
}

function monthTitle(ym){
  if(!ym) return '';
  const [y,m] = ym.split('-');
  return `${y}年${Number(m)}月`;
}

function dayLabel(day){
  if(!targetMonth) return `${day}日`;
  const [y,m] = targetMonth.split('-').map(Number);
  const d = new Date(y, m - 1, day);
  return `${day}日（${DAYS[d.getDay()]}）`;
}

function setButtonLoading(btn, isLoading, text, loadingText){
  if(!btn) return;
  if(isLoading){
    btn.dataset.originalText = btn.textContent;
    btn.textContent = loadingText || '処理中...';
    btn.disabled = true;
  }else{
    btn.textContent = btn.dataset.originalText || text || btn.textContent;
    btn.disabled = false;
  }
}

function showLoading(text = '処理中...', sub = 'しばらくお待ちください'){
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingSub').textContent = sub;
  document.getElementById('loadingOverlay').classList.add('show');
}

function hideLoading(){
  document.getElementById('loadingOverlay').classList.remove('show');
}

function showToast(message){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=>{
    toast.classList.remove('show');
  }, 1800);
}

function buildCalendar(){
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  DAYS.forEach((w, index)=>{
    const head = document.createElement('div');
    head.className = 'week';
    if(index === 0) head.classList.add('sun');
    if(index === 6) head.classList.add('sat');
    head.textContent = w;
    cal.appendChild(head);
  });

  if(!targetMonth){
    return;
  }

  const [y,m] = targetMonth.split('-').map(Number);
  const firstDay = new Date(y, m - 1, 1).getDay();
  const lastDay = new Date(y, m, 0).getDate();

  const today = new Date();
  const isCurrentMonth =
    today.getFullYear() === y &&
    today.getMonth() === m - 1;

  for(let i=0; i<firstDay; i++){
    const blank = document.createElement('div');
    blank.className = 'day blank';
    cal.appendChild(blank);
  }

  for(let i=1; i<=lastDay; i++){
    const d = new Date(y, m - 1, i);
    const dow = d.getDay();

    const cell = document.createElement('div');
    cell.className = 'day';

    if(dow === 0) cell.classList.add('sun');
    if(dow === 6) cell.classList.add('sat');
    if(isCurrentMonth && today.getDate() === i) cell.classList.add('today');
    if(selected.includes(i)) cell.classList.add('selected');

    cell.innerHTML = `
      <div class="num">${i}</div>
      <div class="dow">${DAYS[dow]}</div>
    `;

    cell.onclick = ()=>{
      if(isSubmitting) return;
      if(selected.includes(i)){
        selected = selected.filter(v=>v!==i);
      }else{
        selected.push(i);
        selected.sort((a,b)=>a-b);
      }
      renderSelected();
      buildCalendar();
    };

    cal.appendChild(cell);
  }
}

function renderSelected(){
  const el = document.getElementById('selected');
  el.innerHTML = '';

  if(selected.length === 0){
    el.innerHTML = '<div class="muted">未選択</div>';
    return;
  }

  selected.forEach(d=>{
    el.innerHTML += `<span class="chip pop-in">${dayLabel(d)}</span>`;
  });
}

function showView(showCompletion = false){
  show('view');

  document.getElementById('viewMonth').innerText = monthTitle(currentData.targetMonth || targetMonth);

  const datesEl = document.getElementById('viewDates');
  datesEl.innerHTML = '';

  const dates = currentData.selectedDates || [];
  if(dates.length === 0){
    datesEl.innerHTML = '<div class="muted">なし</div>';
  }else{
    dates.forEach(d=>{
      datesEl.innerHTML += `<span class="chip pop-in">${dayLabel(d)}</span>`;
    });
  }

  document.getElementById('viewNote').innerText = currentData.note || 'なし';

  const banner = document.getElementById('successBanner');
  if(showCompletion){
    banner.classList.remove('hidden');
    banner.classList.add('pop-in');
    showToast('送信が完了しました');
  }else{
    banner.classList.add('hidden');
    banner.classList.remove('pop-in');
  }
}

async function init(){
  try{
    showLoading('読み込み中...', '提出状況を確認しています');

    const res = await fetch(API + '?action=bootstrap&userId=' + encodeURIComponent(USER) + '&_t=' + Date.now(), {
      cache: 'no-store'
    });
    const json = await res.json();

    const payload = json.data ? json.data : json;

    if(json.ok === false){
      document.getElementById('title').innerText = '読み込みエラー';
      document.getElementById('subtitle').innerText = json.error || '取得に失敗しました';
      hideLoading();
      return;
    }

    targetMonth = payload.targetMonth || '';
    document.getElementById('title').innerText = targetMonth ? `${monthTitle(targetMonth)} シフト希望` : 'シフト希望';
    document.getElementById('subtitle').innerText = payload.driverName ? `${payload.driverName} さん` : '確認しています...';

    if(payload.mode === 'bind'){
      show('bind');
      hideLoading();
      return;
    }

    if(payload.mode === 'inactive'){
      document.getElementById('subtitle').innerText = '利用対象外です';
      hideLoading();
      return;
    }

    if(payload.mode === 'view' && payload.submitted){
      currentData = payload.submitted;
      targetMonth = currentData.targetMonth || targetMonth;
      showView(false);
      hideLoading();
      return;
    }

    if(payload.mode === 'input'){
      selected = [];
      currentData = null;
      document.getElementById('note').value = '';
      buildCalendar();
      renderSelected();
      show('input');
      hideLoading();
      return;
    }

    document.getElementById('subtitle').innerText = '想定外の返り値です';
    hideLoading();
  }catch(err){
    document.getElementById('title').innerText = '通信エラー';
    document.getElementById('subtitle').innerText = String(err);
    hideLoading();
  }
}

async function bindUser(){
  if(isBinding) return;

  document.getElementById('bindError').innerText = '';
  const btn = document.getElementById('bindBtn');

  try{
    isBinding = true;
    setButtonLoading(btn, true, '本人確認して開始', '確認中...');
    showLoading('本人確認中...', '内容を照合しています');

    const res = await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action:'bindDriver',
        userId:USER,
        name:document.getElementById('name').value.trim(),
        pin:document.getElementById('pin').value.trim()
      })
    });

    const json = await res.json();
    if(!json.ok){
      document.getElementById('bind').classList.remove('shake');
      void document.getElementById('bind').offsetWidth;
      document.getElementById('bind').classList.add('shake');
      document.getElementById('bindError').innerText = json.error || '本人確認に失敗しました';
      hideLoading();
      return;
    }

    showToast('本人確認が完了しました');
    await init();
  }catch(err){
    document.getElementById('bindError').innerText = String(err);
    hideLoading();
  }finally{
    isBinding = false;
    setButtonLoading(btn, false, '本人確認して開始');
    hideLoading();
  }
}

async function submitShift(){
  if(isSubmitting) return;

  document.getElementById('submitError').innerText = '';

  if(selected.length === 0){
    document.getElementById('input').classList.remove('shake');
    void document.getElementById('input').offsetWidth;
    document.getElementById('input').classList.add('shake');
    document.getElementById('submitError').innerText = '休み希望日を選択してください';
    return;
  }

  const btn = document.getElementById('submitBtn');

  try{
    isSubmitting = true;
    setButtonLoading(btn, true, '送信', '送信中...');
    showLoading('送信中...', 'シフト希望を保存しています');

    const res = await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action:'submitShift',
        userId:USER,
        targetMonth:targetMonth,
        selectedDates:selected,
        note:document.getElementById('note').value
      })
    });

    const json = await res.json();

    if(!json.ok){
      document.getElementById('input').classList.remove('shake');
      void document.getElementById('input').offsetWidth;
      document.getElementById('input').classList.add('shake');
      document.getElementById('submitError').innerText = json.error || '送信に失敗しました';
      hideLoading();
      return;
    }

    currentData = json.submitted || {
      targetMonth,
      selectedDates:[...selected],
      note:document.getElementById('note').value
    };

    hideLoading();

    requestAnimationFrame(()=>{
      showView(true);
    });
  }catch(err){
    document.getElementById('submitError').innerText = String(err);
    hideLoading();
  }finally{
    isSubmitting = false;
    setButtonLoading(btn, false, '送信');
    hideLoading();
  }
}

function editShift(){
  if(currentData){
    selected = [...(currentData.selectedDates || [])];
    document.getElementById('note').value = currentData.note || '';
  }
  buildCalendar();
  renderSelected();
  show('input');
  showToast('編集モードに切り替えました');
}

init();
</script>
</body>
</html>
