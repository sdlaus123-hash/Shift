<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f6f4ee;
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.header{
  background:#111;
  color:#fff;
  padding:20px;
  border-radius:20px;
  margin-bottom:16px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:10px;
  text-align:center;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:14px;
}

.selected{
  background:#ffd95c;
  font-weight:bold;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  font-size:16px;
}

.main{background:#111;color:#fff;}
.sub{background:#ffd95c;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
  <h2 id="title">読み込み中...</h2>
</div>

<!-- 本人確認 -->
<div id="bind" class="card hidden">
  <input id="name" placeholder="名前" class="btn">
  <input id="pin" placeholder="PIN" class="btn">
  <button class="btn main" onclick="bind()">本人確認</button>
</div>

<!-- 入力 -->
<div id="input" class="card hidden">
  <div id="calendar" class="calendar"></div>

  <div id="selected"></div>

  <textarea id="note" placeholder="備考"></textarea>

  <button class="btn main" onclick="submit()">送信</button>
</div>

<!-- 確認 -->
<div id="view" class="card hidden">
  <h3>送信済み</h3>
  <div id="viewDates"></div>
  <div id="viewNote"></div>

  <button class="btn sub" onclick="edit()">変更する</button>
</div>

</div>

<script>
const API = '/api/shift';
const USER = 'demo-user-001';

let selected=[];
let current=null;

// ===== 初期 =====
async function init(){
  const res = await fetch(API+'?action=bootstrap&userId='+USER);
  const json = await res.json();

  if(json.mode==='bind'){
    show('bind');
    return;
  }

  if(json.mode==='view'){
    current = json.data;
    showView();
    return;
  }

  if(json.mode==='input'){
    show('input');
    build();
  }
}

// ===== 表示切替 =====
function show(id){
  ['bind','input','view'].forEach(v=>{
    document.getElementById(v).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

// ===== カレンダー =====
function build(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';

  for(let i=1;i<=31;i++){
    const d=document.createElement('div');
    d.className='day';
    d.innerText=i;

    if(selected.includes(i)) d.classList.add('selected');

    d.onclick=()=>{
      if(selected.includes(i)){
        selected=selected.filter(v=>v!==i);
      }else{
        selected.push(i);
      }
      render();
    };

    cal.appendChild(d);
  }
}

function render(){
  build();
  const el=document.getElementById('selected');
  el.innerHTML='';
  selected.forEach(d=>{
    el.innerHTML+=`<span>${d}日 </span>`;
  });
}

// ===== 本人確認 =====
async function bind(){
  await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:'bindDriver',
      userId:USER,
      name:document.getElementById('name').value,
      pin:document.getElementById('pin').value
    })
  });
  location.reload();
}

// ===== 送信 =====
async function submit(){
  const res = await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:'submitShift',
      userId:USER,
      selectedDates:selected,
      note:document.getElementById('note').value
    })
  });

  const json = await res.json();

  if(json.ok){
    current={
      selectedDates:selected,
      note:document.getElementById('note').value
    };
    showView();
  }
}

// ===== 表示 =====
function showView(){
  show('view');

  document.getElementById('viewDates').innerHTML =
    current.selectedDates.map(v=>v+'日').join(',');

  document.getElementById('viewNote').innerText =
    current.note || '';
}

// ===== 編集 =====
function edit(){
  selected=current.selectedDates;
  document.getElementById('note').value=current.note;
  show('input');
  render();
}

init();
</script>

</body>
</html>
