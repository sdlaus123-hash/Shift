<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>シフト希望</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOKENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --ink:        #0b0e18;
  --deep:       #0f1420;
  --panel:      #151b2e;
  --glass:      #1c2440;
  --rim:        #252f4a;
  --line:       #2a3554;
  --muted:      #3d4f72;
  --sub:        #6b7fa8;
  --body:       #a8b4d0;
  --text:       #dce4f5;
  --bright:     #eef2fc;
  --amber:      #f5a623;
  --amber-soft: rgba(245,166,35,.12);
  --amber-glow: rgba(245,166,35,.06);
  --teal:       #38d9c0;
  --teal-soft:  rgba(56,217,192,.1);
  --red:        #f0614a;
  --red-soft:   rgba(240,97,74,.1);
  --green:      #4ade80;
  --green-soft: rgba(74,222,128,.1);
  --r:          16px;
  --r-sm:       10px;
  --shadow:     0 24px 64px rgba(0,0,0,.5);
  --shadow-sm:  0 4px 20px rgba(0,0,0,.3);
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESET & BASE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
html { height: 100%; background: var(--ink); }
 
body {
  min-height: 100dvh;
  font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', serif;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,217,192,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(245,166,35,.05) 0%, transparent 60%),
    var(--ink);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LAYOUT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.shell {
  max-width: 430px;
  margin: 0 auto;
  padding: 0 16px 40px;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SPLASH / LOADING
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#splash {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  background: var(--ink); z-index: 200;
  transition: opacity .4s ease, visibility .4s ease;
}
#splash.gone { opacity: 0; visibility: hidden; }
 
.splash-logo {
  font-size: 13px; letter-spacing: .3em;
  color: var(--sub); font-family: 'DM Mono', monospace; font-weight: 300;
  text-transform: uppercase;
}
.splash-ring {
  width: 36px; height: 36px;
  border: 2px solid var(--line);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOP BAR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.topbar {
  padding: 20px 0 0;
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px;
}
.topbar-left {}
.topbar-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .2em;
  color: var(--amber); text-transform: uppercase; margin-bottom: 6px;
}
.topbar-title {
  font-size: 22px; font-weight: 700; line-height: 1.2;
  color: var(--bright);
}
.topbar-sub {
  font-size: 13px; color: var(--sub); margin-top: 4px;
  font-family: 'DM Mono', monospace; font-weight: 300;
}
.topbar-badge {
  background: var(--amber-soft);
  border: 1px solid rgba(245,166,35,.25);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--amber); font-weight: 500;
  letter-spacing: .05em; white-space: nowrap;
  flex-shrink: 0; margin-top: 4px;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SCREENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.screen { display: none; animation: rise .35s cubic-bezier(.16,1,.3,1); }
.screen.active { display: block; }
@keyframes rise {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PANEL (共通カード)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--muted), transparent);
  opacity: .4;
}
 
.panel-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .2em;
  color: var(--sub); text-transform: uppercase;
  margin-bottom: 14px;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FORM FIELDS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field-label {
  display: block;
  font-size: 11px; font-weight: 500;
  color: var(--sub); letter-spacing: .1em;
  margin-bottom: 7px; text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}
.field-input {
  width: 100%;
  background: var(--glass);
  border: 1.5px solid var(--line);
  border-radius: var(--r-sm);
  color: var(--bright);
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  padding: 14px 16px;
  -webkit-appearance: none; appearance: none;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.field-input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px var(--amber-soft);
}
.field-input::placeholder { color: var(--muted); }
 
textarea.field-input {
  resize: none; min-height: 88px;
  line-height: 1.6;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BUTTONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.btn {
  width: 100%; height: 54px;
  border: none; border-radius: var(--r-sm);
  font-family: 'Shippori Mincho', serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: .05em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .15s, transform .1s, box-shadow .2s;
  -webkit-tap-highlight-color: transparent;
  margin-top: 14px; position: relative; overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0);
  transition: background .15s;
}
.btn:active::after { background: rgba(255,255,255,.06); }
.btn:active { transform: scale(.985); }
.btn:disabled { opacity: .35; pointer-events: none; }
 
.btn-primary {
  background: linear-gradient(135deg, #e8960f 0%, #f5a623 50%, #e8960f 100%);
  color: #0b0e18;
  box-shadow: 0 8px 24px rgba(245,166,35,.25);
}
.btn-primary:hover { box-shadow: 0 8px 32px rgba(245,166,35,.4); }
 
.btn-ghost {
  background: var(--glass);
  border: 1.5px solid var(--line);
  color: var(--body);
}
.btn-ghost:hover { border-color: var(--muted); color: var(--text); }
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ALERT BANNER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.alert {
  display: none; border-radius: var(--r-sm);
  padding: 12px 14px; font-size: 13px; line-height: 1.55;
  margin-top: 12px; font-family: 'DM Mono', monospace; font-weight: 300;
}
.alert.show { display: block; animation: rise .2s ease; }
.alert-error  { background: var(--red-soft); border: 1px solid rgba(240,97,74,.25); color: var(--red); }
.alert-info   { background: var(--amber-glow); border: 1px solid rgba(245,166,35,.2); color: var(--amber); }
.alert-success{ background: var(--green-soft); border: 1px solid rgba(74,222,128,.2); color: var(--green); }
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CALENDAR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.cal-month-label {
  font-size: 15px; font-weight: 700; color: var(--bright);
}
.cal-nav {
  width: 32px; height: 32px;
  background: var(--glass); border: 1px solid var(--line);
  border-radius: 8px; color: var(--body);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .15s, color .15s;
}
.cal-nav:active { background: var(--rim); }
.cal-nav.hidden { visibility: hidden; }
 
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-dow {
  text-align: center; padding: 6px 2px;
  font-family: 'DM Mono', monospace;
  font-size: 9px; font-weight: 500; letter-spacing: .1em;
  color: var(--muted); text-transform: uppercase;
}
.cal-dow.sun { color: rgba(240,97,74,.6); }
.cal-dow.sat { color: rgba(56,217,192,.5); }
 
.cal-cell {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 10px; cursor: pointer;
  border: 1px solid transparent;
  transition: background .12s, border-color .12s, transform .08s;
  -webkit-tap-highlight-color: transparent;
  position: relative; gap: 1px;
  user-select: none;
}
.cal-cell:not(.empty):not(.selected):active {
  background: var(--glass); transform: scale(.93);
}
.cal-cell.empty { cursor: default; }
 
.cal-num {
  font-size: 14px; font-weight: 700; line-height: 1;
  color: var(--body);
}
.cal-wd {
  font-family: 'DM Mono', monospace;
  font-size: 8px; color: var(--muted);
}
 
.cal-cell.sun-col .cal-num { color: rgba(240,97,74,.75); }
.cal-cell.sat-col .cal-num { color: rgba(56,217,192,.7); }
 
.cal-cell.today { border-color: var(--line); }
.cal-cell.today::after {
  content: '';
  position: absolute; bottom: 4px;
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--amber);
}
 
.cal-cell.selected {
  background: linear-gradient(135deg, rgba(245,166,35,.22), rgba(245,166,35,.12));
  border-color: rgba(245,166,35,.45);
}
.cal-cell.selected .cal-num { color: var(--amber); font-weight: 700; }
.cal-cell.selected .cal-wd  { color: rgba(245,166,35,.6); }
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SELECTED CHIPS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chips-wrap {
  display: flex; flex-wrap: wrap; gap: 6px;
  min-height: 28px;
}
.chip {
  background: var(--amber-soft);
  border: 1px solid rgba(245,166,35,.3);
  border-radius: 20px; padding: 5px 10px 5px 12px;
  font-size: 12px; color: var(--amber);
  font-family: 'DM Mono', monospace; font-weight: 400;
  display: flex; align-items: center; gap: 6px;
  animation: pop .2s cubic-bezier(.16,1,.3,1);
}
@keyframes pop { from { opacity:0; transform:scale(.8); } to { opacity:1; transform:scale(1); } }
.chip-x {
  width: 16px; height: 16px; border-radius: 50%;
  background: rgba(245,166,35,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; cursor: pointer; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s;
}
.chip-x:active { background: rgba(245,166,35,.4); }
.chips-empty {
  font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--muted);
  padding: 4px 0;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   VIEW (確認) 画面
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.view-status {
  display: flex; align-items: center; gap: 10px;
  background: var(--green-soft);
  border: 1px solid rgba(74,222,128,.2);
  border-radius: var(--r-sm);
  padding: 12px 16px; margin-bottom: 14px;
}
.view-status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 6px var(--green); }
  50%      { box-shadow: 0 0 14px var(--green); }
}
.view-status-text {
  font-size: 13px; color: var(--green); font-weight: 500;
}
 
.view-row {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 13px 0; border-bottom: 1px solid var(--line);
}
.view-row:last-child { border-bottom: none; padding-bottom: 0; }
.view-row-key {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--sub); padding-top: 2px; min-width: 60px; flex-shrink: 0;
}
.view-row-val {
  font-size: 14px; color: var(--text); line-height: 1.6; flex: 1;
}
.view-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.view-tag {
  background: var(--amber-soft);
  border: 1px solid rgba(245,166,35,.25);
  border-radius: 6px; padding: 3px 9px;
  font-size: 12px; font-weight: 700; color: var(--amber);
  font-family: 'DM Mono', monospace;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INACTIVE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.inactive-wrap {
  min-height: 70dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  text-align: center; padding: 40px 0;
}
.inactive-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--red-soft); border: 1px solid rgba(240,97,74,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.inactive-title { font-size: 18px; font-weight: 700; color: var(--bright); }
.inactive-body { font-size: 13px; color: var(--sub); line-height: 1.7; }
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DIVIDER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.divider {
  height: 1px; background: var(--line);
  margin: 16px 0; opacity: .5;
}
</style>
</head>
<body>
 
<!-- ─── Splash ─────────────────────────────── -->
<div id="splash">
  <div class="splash-logo">Shift System</div>
  <div class="splash-ring"></div>
</div>
 
<div class="shell">
  <!-- ─── Top Bar ──────────────────────────── -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-eyebrow">Shift Request</div>
      <div class="topbar-title" id="topTitle">シフト希望</div>
      <div class="topbar-sub" id="topSub">―</div>
    </div>
    <div class="topbar-badge" id="topBadge" style="display:none"></div>
  </div>
 
  <!-- ━━━ 本人確認 ━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <div id="screen-bind" class="screen">
    <div class="panel">
      <div class="panel-label">Initial Verification</div>
      <div class="alert alert-info show" style="margin-top:0;margin-bottom:14px;">
        初回のみ本人確認が必要です。<br>登録後は自動でログインします。
      </div>
      <div class="field">
        <label class="field-label" for="f-name">氏名</label>
        <input class="field-input" id="f-name" type="text" placeholder="山田 太郎" autocomplete="name">
      </div>
      <div class="field">
        <label class="field-label" for="f-pin">PIN</label>
        <input class="field-input" id="f-pin" type="tel" placeholder="0000" maxlength="8" inputmode="numeric" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="btn-bind" onclick="bindUser()">
        本人確認して開始
      </button>
      <div class="alert alert-error" id="err-bind"></div>
    </div>
  </div>
 
  <!-- ━━━ 入力 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <div id="screen-input" class="screen">
    <!-- Calendar -->
    <div class="panel">
      <div class="cal-header">
        <button class="cal-nav" id="cal-prev" onclick="calNav(-1)">‹</button>
        <span class="cal-month-label" id="cal-label"></span>
        <button class="cal-nav" id="cal-next" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
 
    <!-- Selected -->
    <div class="panel">
      <div class="panel-label">Selected Days</div>
      <div class="chips-wrap" id="chips-wrap">
        <span class="chips-empty">日付を選択してください</span>
      </div>
    </div>
 
    <!-- Note -->
    <div class="panel">
      <div class="panel-label">Remarks  ／  備考</div>
      <div class="field">
        <textarea class="field-input" id="f-note" placeholder="特記事項があれば入力してください"></textarea>
      </div>
    </div>
 
    <button class="btn btn-primary" id="btn-submit" onclick="submitShift()">
      送信する
    </button>
    <div class="alert alert-error" id="err-submit"></div>
  </div>
 
  <!-- ━━━ 確認 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <div id="screen-view" class="screen">
    <div class="panel">
      <div class="view-status">
        <div class="view-status-dot"></div>
        <div class="view-status-text">送信済み — 受け付け完了</div>
      </div>
      <div class="view-row">
        <div class="view-row-key">対象月</div>
        <div class="view-row-val" id="view-month">―</div>
      </div>
      <div class="view-row">
        <div class="view-row-key">休み希望</div>
        <div class="view-row-val" id="view-days">―</div>
      </div>
      <div class="view-row">
        <div class="view-row-key">備考</div>
        <div class="view-row-val" id="view-note" style="white-space:pre-wrap;">―</div>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="goEdit()">
      ✎ &thinsp;内容を変更する
    </button>
  </div>
 
  <!-- ━━━ 利用不可 ━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <div id="screen-inactive" class="screen">
    <div class="inactive-wrap">
      <div class="inactive-icon">🚫</div>
      <div class="inactive-title">利用できません</div>
      <div class="inactive-body">このアカウントは現在<br>ご利用いただけません。<br>管理者へお問い合わせください。</div>
    </div>
  </div>
</div><!-- /shell -->
 
<script>
/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const API_URL     = '/api/shift';
const LINE_USER_ID = new URLSearchParams(location.search).get('uid') || 'demo-user-001';
const DOW          = ['日','月','火','水','木','金','土'];
 
/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let selected    = [];   // ["YYYY-MM-DD", ...]
let currentData = null; // { days, note, targetMonth }
let targetMonth = '';   // "YYYY-MM"
let calYear = 0, calMonth = 0;
 
/* ═══════════════════════════════════════════════════
   SCREEN
═══════════════════════════════════════════════════ */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}
 
/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
function setTop(title, sub, badge) {
  document.getElementById('topTitle').textContent = title || 'シフト希望';
  document.getElementById('topSub').textContent   = sub   || '―';
  const b = document.getElementById('topBadge');
  if (badge) { b.textContent = badge; b.style.display = ''; }
  else        { b.style.display = 'none'; }
}
 
/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function fmtMonth(ym) {
  if (!ym) return '';
  const [y, m] = ym.split('-');
  return `${y}年${Number(m)}月`;
}
function fmtDate(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  return `${m}/${d}(${DOW[new Date(y, m-1, d).getDay()]})`;
}
function todayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}
function dsOf(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
 
/* ═══════════════════════════════════════════════════
   ALERT
═══════════════════════════════════════════════════ */
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}
 
/* ═══════════════════════════════════════════════════
   BUTTON LOADING
═══════════════════════════════════════════════════ */
function setBtnState(id, loading, label) {
  const b = document.getElementById(id);
  b.disabled = loading;
  b.textContent = label;
}
 
/* ═══════════════════════════════════════════════════
   CALENDAR
═══════════════════════════════════════════════════ */
function buildCalendar() {
  const [ty, tm] = targetMonth.split('-').map(Number);
  document.getElementById('cal-label').textContent = `${calYear}年${calMonth}月`;
 
  // nav visibility
  const isMin = (calYear === ty && calMonth === tm);
  const isMax = calMonth === tm && calYear === ty
    || (new Date(calYear, calMonth - 1, 1) >= new Date(ty, tm - 1, 1));
  document.getElementById('cal-prev').classList.toggle('hidden', isMin);
  document.getElementById('cal-next').classList.toggle('hidden',
    new Date(calYear, calMonth, 1) > new Date(ty, tm - 1, 1));
 
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
 
  // header row
  ['日','月','火','水','木','金','土'].forEach((w, i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i===0?' sun':i===6?' sat':'');
    el.textContent = w;
    grid.appendChild(el);
  });
 
  const first = new Date(calYear, calMonth - 1, 1).getDay();
  const last  = new Date(calYear, calMonth, 0).getDate();
  const td    = todayStr();
 
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }
  for (let d = 1; d <= last; d++) {
    const ds  = dsOf(calYear, calMonth, d);
    const dow = new Date(calYear, calMonth - 1, d).getDay();
    const el  = document.createElement('div');
    el.className = 'cal-cell'
      + (dow === 0 ? ' sun-col' : dow === 6 ? ' sat-col' : '')
      + (ds === td ? ' today' : '')
      + (selected.includes(ds) ? ' selected' : '');
    el.innerHTML = `<span class="cal-num">${d}</span><span class="cal-wd">${DOW[dow]}</span>`;
    el.addEventListener('click', () => toggleDay(ds, el));
    grid.appendChild(el);
  }
}
 
function calNav(dir) {
  calMonth += dir;
  if (calMonth > 12) { calMonth = 1;  calYear++; }
  if (calMonth < 1)  { calMonth = 12; calYear--; }
  buildCalendar();
}
 
function toggleDay(ds, el) {
  const idx = selected.indexOf(ds);
  if (idx >= 0) {
    selected.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    selected.push(ds);
    selected.sort();
    el.classList.add('selected');
  }
  renderChips();
}
 
/* ═══════════════════════════════════════════════════
   CHIPS
═══════════════════════════════════════════════════ */
function renderChips() {
  const wrap = document.getElementById('chips-wrap');
  if (!selected.length) {
    wrap.innerHTML = '<span class="chips-empty">日付を選択してください</span>';
    return;
  }
  wrap.innerHTML = selected.map(ds =>
    `<span class="chip">${fmtDate(ds)}<span class="chip-x" onclick="removeDay('${ds}')">×</span></span>`
  ).join('');
}
 
function removeDay(ds) {
  selected = selected.filter(v => v !== ds);
  buildCalendar();
  renderChips();
}
 
/* ═══════════════════════════════════════════════════
   VIEW SCREEN
═══════════════════════════════════════════════════ */
function renderView() {
  const { days = [], note = '', targetMonth: tm } = currentData;
  document.getElementById('view-month').textContent = fmtMonth(tm || targetMonth);
 
  const daysEl = document.getElementById('view-days');
  if (!days.length) {
    daysEl.innerHTML = '<span style="color:var(--sub);font-size:13px;">希望なし</span>';
  } else {
    daysEl.innerHTML = `<div class="view-tags">${days.map(ds =>
      `<span class="view-tag">${fmtDate(ds)}</span>`).join('')}</div>`;
  }
 
  document.getElementById('view-note').textContent = note || '（なし）';
}
 
/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
async function init() {
  try {
    const res = await api('bootstrap', { lineUserId: LINE_USER_ID });
    targetMonth = res.targetMonth || '';
 
    const monthLabel = targetMonth ? fmtMonth(targetMonth) : '';
    setTop(
      monthLabel ? `${monthLabel} シフト希望` : 'シフト希望',
      res.driverName ? `${res.driverName} さん` : '―',
      monthLabel || null
    );
 
    if (res.mode === 'bind') {
      showScreen('bind');
    } else if (res.mode === 'inactive') {
      setTop('シフト希望', '利用対象外', null);
      showScreen('inactive');
    } else if (res.mode === 'view' && res.submitted) {
      currentData = res.submitted;
      targetMonth = currentData.targetMonth || targetMonth;
      renderView();
      showScreen('view');
    } else if (res.mode === 'input') {
      selected = [];
      document.getElementById('f-note').value = '';
      const [y, m] = targetMonth.split('-').map(Number);
      calYear = y; calMonth = m;
      buildCalendar();
      renderChips();
      showScreen('input');
    } else {
      setTop('エラー', '想定外のレスポンス', null);
    }
  } catch (e) {
    setTop('読み込みエラー', e.message, null);
  } finally {
    document.getElementById('splash').classList.add('gone');
  }
}
 
/* ═══════════════════════════════════════════════════
   BIND
═══════════════════════════════════════════════════ */
async function bindUser() {
  showErr('err-bind', '');
  const name = document.getElementById('f-name').value.trim();
  const pin  = document.getElementById('f-pin').value.trim();
  if (!name || !pin) { showErr('err-bind', '氏名とPINを入力してください'); return; }
 
  setBtnState('btn-bind', true, '確認中…');
  try {
    await api('bindDriver', { lineUserId: LINE_USER_ID, name, pin });
    await init();
  } catch (e) {
    showErr('err-bind', e.message);
  } finally {
    setBtnState('btn-bind', false, '本人確認して開始');
  }
}
 
/* ═══════════════════════════════════════════════════
   SUBMIT
═══════════════════════════════════════════════════ */
async function submitShift() {
  showErr('err-submit', '');
  const note = document.getElementById('f-note').value.trim();
  setBtnState('btn-submit', true, '送信中…');
  try {
    await api('submitShift', { lineUserId: LINE_USER_ID, targetMonth, days: selected, note });
    currentData = { targetMonth, days: [...selected], note };
    renderView();
    showScreen('view');
  } catch (e) {
    showErr('err-submit', e.message);
  } finally {
    setBtnState('btn-submit', false, '送信する');
  }
}
 
/* ═══════════════════════════════════════════════════
   EDIT
═══════════════════════════════════════════════════ */
function goEdit() {
  if (currentData) {
    selected = [...(currentData.days || [])];
    document.getElementById('f-note').value = currentData.note || '';
    const [y, m] = (currentData.targetMonth || targetMonth).split('-').map(Number);
    calYear = y; calMonth = m;
  }
  buildCalendar();
  renderChips();
  showScreen('input');
}
 
/* ═══════════════════════════════════════════════════
   API CALL
═══════════════════════════════════════════════════ */
async function api(action, body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...body })
  });
  let data;
  try { data = await res.json(); }
  catch { throw new Error('サーバーから不正なレスポンスが返りました'); }
  if (data.ok === false) throw new Error(data.message || '通信エラーが発生しました');
  return data;
}
 
/* ─── START ─── */
init();
</script>
</body>
</html>
