<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>シフト希望</title>
<style>
:root{
  --bg:#f6f4ee;
  --text:#222;
  --muted:#666;
  --panel:#fff;
  --line:#ddd;
  --line-soft:#eee;
  --brand:#111;
  --accent:#ffd95c;
  --accent-deep:#e0b93d;
  --accent-soft:#fff4c7;
  --success-bg:#eef8ef;
  --success-line:#b9dcbd;
  --success-text:#1f5f2a;
  --info-bg:#fff6dc;
  --info-line:#f0dfaa;
  --danger:#b3261e;
  --sun:#d04a3a;
  --sat:#3f72c8;
  --shadow-lg:0 10px 25px rgba(0,0,0,.12);
  --shadow-md:0 10px 25px rgba(0,0,0,.08);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.header{
  background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);
  color:#fff;
  padding:20px;
  border-radius:20px;
  margin-bottom:16px;
  box-shadow:var(--shadow-lg);
}

.header small{
  color:var(--accent);
  display:block;
  margin-bottom:6px;
  font-weight:700;
  letter-spacing:.02em;
}

.card{
  background:var(--panel);
  border-radius:20px;
  padding:16px;
  box-shadow:var(--shadow-md);
}

.hidden{display:none !important;}

.label{
  font-size:14px;
  font-weight:700;
  margin:10px 0 8px;
}

input, textarea{
  width:100%;
  box-sizing:border-box;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  font-size:16px;
  margin-bottom:10px;
  background:#fff;
  transition:border-color .15s ease, box-shadow .15s ease;
}

input:focus, textarea:focus{
  outline:none;
  border-color:#c8c8c8;
  box-shadow:0 0 0 4px rgba(0,0,0,.04);
}

textarea{
  min-height:100px;
  resize:vertical;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  font-size:16px;
  font-weight:700;
  transition:transform .08s ease, opacity .12s ease;
}

.btn:active{
  transform:scale(.99);
}

.main{
  background:var(--brand);
  color:#fff;
}

.sub{
  background:var(--accent);
  color:#111;
}

.info{
  background:var(--info-bg);
  border:1px solid var(--info-line);
  padding:12px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
  margin-bottom:12px;
}

.success{
  background:var(--success-bg);
  border:1px solid var(--success-line);
  color:var(--success-text);
  padding:12px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
  margin-bottom:12px;
  font-weight:700;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:12px;
}

.week{
  text-align:center;
  font-size:11px;
  color:#777;
  font-weight:700;
  padding-bottom:2px;
}

.week.sun{ color:var(--sun); }
.week.sat{ color:var(--sat); }

.day{
  min-height:64px;
  padding:8px 4px;
  text-align:center;
  border:1px solid var(--line);
  border-radius:12px;
  cursor:pointer;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
  user-select:none;
}

.day:hover{
  box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.day:active{
  transform:scale(.98);
}

.day.blank{
  border:none;
  background:transparent;
  box-shadow:none;
  cursor:default;
  min-height:64px;
}

.day .num{
  font-size:15px;
  font-weight:700;
  line-height:1.1;
}

.day .dow{
  font-size:10px;
  margin-top:4px;
  line-height:1;
}

.day.sun .num,
.day.sun .dow{
  color:var(--sun);
}

.day.sat .num,
.day.sat .dow{
  color:var(--sat);
}

.day.today{
  border-color:#cfcfcf;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
}

.day.selected{
  background:linear-gradient(180deg,#ffe78a 0%, #ffd95c 100%);
  font-weight:bold;
  border-color:var(--accent-deep);
  box-shadow:0 8px 16px rgba(224,185,61,.24);
}

.day.selected .num,
.day.selected .dow{
  color:#5f4b00 !important;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.chip{
  display:inline-block;
  padding:7px 10px;
  border-radius:999px;
  background:var(--accent-soft);
  font-size:13px;
  border:1px solid #f0df9d;
}

.error{
  color:var(--danger);
  font-size:14px;
  margin-top:10px;
  white-space:pre-wrap;
}

.muted{
  color:var(--muted);
  font-size:14px;
}

.box{
  border:1px solid var(--line-soft);
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  background:#fafafa;
}

@media (max-width:380px){
  .wrap{
    padding:12px;
  }
  .day{
    min-height:58px;
  }
  .day.blank{
    min-height:58px;
  }
  .day .num{
    font-size:14px;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <small>シフト希望</small>
    <h2 id="title" style="margin:0 0 6px;">読み込み中...</h2>
    <div id="subtitle" style="font-size:14px;color:rgba(255,255,255,.7);">確認しています...</div>
  </div>

  <div id="bind" class="card hidden">
    <div class="info">
      初回のみ本人確認をしてください。<br>
      一度紐づけば、次回からは自動で提出内容を表示します。
    </div>

    <div class="label">氏名</div>
    <input id="name" placeholder="名前">

    <div class="label">PIN</div>
    <input id="pin" placeholder="PIN" inputmode="numeric">

    <button class="btn main" onclick="bindUser()">本人確認して開始</button>
    <div id="bindError" class="error"></div>
  </div>

  <div id="input" class="card hidden">
    <div class="label">休みたい日を選択</div>
    <div id="calendar" class="calendar"></div>

    <div class="label" style="margin-top:16px;">選択中</div>
    <div id="selected" class="chips"></div>

    <div class="label" style="margin-top:16px;">備考（任意）</div>
    <textarea id="note" placeholder="備考"></textarea>

    <button class="btn main" onclick="submitShift()">送信</button>
    <div id="submitError" class="error"></div>
  </div>

  <div id="view" class="card hidden">
    <div class="success">送信済みです。内容を確認できます。</div>

    <div class="box">
      <div class="muted">対象月</div>
      <div id="viewMonth"></div>
    </div>

    <div class="box">
      <div class="muted">休み希望日</div>
      <div id="viewDates" class="chips"></div>
    </div>

    <div class="box">
      <div class="muted">備考</div>
      <div id="viewNote"></div>
    </div>

    <button class="btn sub" onclick="editShift()">変更する</button>
  </div>
</div>

<script>
const API = '/api/shift';
const USER = 'demo-user-001';
const DAYS = ['日','月','火','水','木','金','土'];

let selected = [];
let currentData = null;
let targetMonth = '';

function getStorageKey(month = targetMonth){
  return `shift_cache_${USER}_${month || 'unknown'}`;
}

function saveLocalCache(data){
  if(!data || !data.targetMonth) return;
  localStorage.setItem(getStorageKey(data.targetMonth), JSON.stringify(data));
}

function loadLocalCache(month){
  if(!month) return null;
  try{
    const raw = localStorage.getItem(getStorageKey(month));
    return raw ? JSON.parse(raw) : null;
  }catch(e){
    return null;
  }
}

function clearLocalCache(month){
  if(!month) return;
  localStorage.removeItem(getStorageKey(month));
}

function show(id){
  ['bind','input','view'].forEach(v=>{
    document.getElementById(v).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function monthTitle(ym){
  if(!ym) return '';
  const [y,m] = ym.split('-');
  return `${y}年${Number(m)}月`;
}

function dayLabel(day){
  if(!targetMonth) return `${day}日`;
  const [y,m] = targetMonth.split('-').map(Number);
  const d = new Date(y, m - 1, day);
  return `${day}日（${DAYS[d.getDay()]}）`;
}

function buildCalendar(){
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  DAYS.forEach((w, index)=>{
    const head = document.createElement('div');
    head.className = 'week';
    if(index === 0) head.classList.add('sun');
    if(index === 6) head.classList.add('sat');
    head.textContent = w;
    cal.appendChild(head);
  });

  if(!targetMonth){
    return;
  }

  const [y,m] = targetMonth.split('-').map(Number);
  const firstDay = new Date(y, m - 1, 1).getDay();
  const lastDay = new Date(y, m, 0).getDate();

  const today = new Date();
  const isCurrentMonth =
    today.getFullYear() === y &&
    today.getMonth() === m - 1;

  for(let i=0; i<firstDay; i++){
    const blank = document.createElement('div');
    blank.className = 'day blank';
    cal.appendChild(blank);
  }

  for(let i=1; i<=lastDay; i++){
    const d = new Date(y, m - 1, i);
    const dow = d.getDay();

    const cell = document.createElement('div');
    cell.className = 'day';

    if(dow === 0) cell.classList.add('sun');
    if(dow === 6) cell.classList.add('sat');
    if(isCurrentMonth && today.getDate() === i) cell.classList.add('today');
    if(selected.includes(i)) cell.classList.add('selected');

    cell.innerHTML = `
      <div class="num">${i}</div>
      <div class="dow">${DAYS[dow]}</div>
    `;

    cell.onclick = ()=>{
      if(selected.includes(i)){
        selected = selected.filter(v=>v!==i);
      }else{
        selected.push(i);
        selected.sort((a,b)=>a-b);
      }
      renderSelected();
      buildCalendar();
    };

    cal.appendChild(cell);
  }
}

function renderSelected(){
  const el = document.getElementById('selected');
  el.innerHTML = '';

  if(selected.length === 0){
    el.innerHTML = '<div class="muted">未選択</div>';
    return;
  }

  selected.forEach(d=>{
    el.innerHTML += `<span class="chip">${dayLabel(d)}</span>`;
  });
}

function showView(){
  show('view');

  document.getElementById('viewMonth').innerText =
    monthTitle(currentData.targetMonth || targetMonth);

  const datesEl = document.getElementById('viewDates');
  datesEl.innerHTML = '';

  const dates = currentData.selectedDates || [];
  if(dates.length === 0){
    datesEl.innerHTML = '<div class="muted">なし</div>';
  }else{
    dates.forEach(d=>{
      datesEl.innerHTML += `<span class="chip">${dayLabel(d)}</span>`;
    });
  }

  document.getElementById('viewNote').innerText = currentData.note || 'なし';
}

function enterInputModeWithCurrentData(){
  if(currentData){
    selected = [...(currentData.selectedDates || [])];
    document.getElementById('note').value = currentData.note || '';
  }else{
    selected = [];
    document.getElementById('note').value = '';
  }
  buildCalendar();
  renderSelected();
  show('input');
}

async function init(){
  try{
    const res = await fetch(
      API + '?action=bootstrap&userId=' + encodeURIComponent(USER) + '&_t=' + Date.now(),
      { cache: 'no-store' }
    );
    const json = await res.json();

    const payload = json.data ? json.data : json;

    if(json.ok === false){
      document.getElementById('title').innerText = '読み込みエラー';
      document.getElementById('subtitle').innerText = json.error || '取得に失敗しました';
      return;
    }

    targetMonth = payload.targetMonth || '';
    document.getElementById('title').innerText =
      targetMonth ? `${monthTitle(targetMonth)} シフト希望` : 'シフト希望';
    document.getElementById('subtitle').innerText =
      payload.driverName ? `${payload.driverName} さん` : '確認しています...';

    if(payload.mode === 'bind'){
      show('bind');
      return;
    }

    if(payload.mode === 'inactive'){
      document.getElementById('subtitle').innerText = '利用対象外です';
      return;
    }

    if(payload.mode === 'view' && payload.submitted){
      currentData = {
        targetMonth: payload.submitted.targetMonth || targetMonth,
        selectedDates: payload.submitted.selectedDates || [],
        note: payload.submitted.note || ''
      };

      targetMonth = currentData.targetMonth || targetMonth;
      selected = [...currentData.selectedDates];
      saveLocalCache(currentData);
      showView();
      return;
    }

    if(payload.mode === 'input'){
      const cached = loadLocalCache(targetMonth);
      if(cached && cached.targetMonth === targetMonth){
        currentData = cached;
        selected = [...(currentData.selectedDates || [])];
        showView();
        return;
      }

      currentData = null;
      selected = [];
      document.getElementById('note').value = '';
      buildCalendar();
      renderSelected();
      show('input');
      return;
    }

    document.getElementById('subtitle').innerText = '想定外の返り値です';
  }catch(err){
    document.getElementById('title').innerText = '通信エラー';
    document.getElementById('subtitle').innerText = String(err);
  }
}

async function bindUser(){
  document.getElementById('bindError').innerText = '';

  try{
    const res = await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action:'bindDriver',
        userId:USER,
        name:document.getElementById('name').value.trim(),
        pin:document.getElementById('pin').value.trim()
      })
    });

    const json = await res.json();
    if(!json.ok){
      document.getElementById('bindError').innerText =
        json.error || '本人確認に失敗しました';
      return;
    }

    await init();
  }catch(err){
    document.getElementById('bindError').innerText = String(err);
  }
}

async function submitShift(){
  document.getElementById('submitError').innerText = '';

  if(selected.length === 0){
    document.getElementById('submitError').innerText = '休み希望日を選択してください';
    return;
  }

  const draftData = {
    targetMonth,
    selectedDates: [...selected],
    note: document.getElementById('note').value || ''
  };

  try{
    const res = await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action:'submitShift',
        userId:USER,
        targetMonth:targetMonth,
        selectedDates:selected,
        note:document.getElementById('note').value
      })
    });

    const json = await res.json();

    if(!json.ok){
      document.getElementById('submitError').innerText =
        json.error || '送信に失敗しました';
      return;
    }

    currentData = json.submitted || draftData;

    if(!currentData.targetMonth){
      currentData.targetMonth = targetMonth;
    }

    selected = [...(currentData.selectedDates || [])];
    saveLocalCache(currentData);
    showView();
  }catch(err){
    document.getElementById('submitError').innerText = String(err);
  }
}

function editShift(){
  enterInputModeWithCurrentData();
}

init();
</script>
</body>
</html>
