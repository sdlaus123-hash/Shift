<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シフト希望</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f7f5;
      color: #222;
    }

    .wrap {
      max-width: 480px;
      margin: auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .hidden {
      display: none;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
    }

    .btnPrimary {
      background: #111;
      color: #fff;
    }

    .btnSub {
      background: #ffe28a;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 4px;
      margin-top: 12px;
    }

    .day {
      padding: 10px;
      text-align: center;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .selected {
      background: #ffd65e;
    }

    .chip {
      background: #fff6d9;
      padding: 6px 10px;
      border-radius: 20px;
      margin: 4px;
      display: inline-block;
    }

    .success {
      background: #eaf8ec;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    textarea, input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1 id="title">読み込み中...</h1>

  <!-- 初回認証 -->
  <div id="bindView" class="card hidden">
    <p>初回のみ本人確認をしてください</p>

    <input id="bindName" placeholder="氏名" />
    <input id="bindPin" type="password" placeholder="PIN" />

    <button class="btn btnPrimary" onclick="bind()">開始</button>
    <div id="bindError"></div>
  </div>

  <!-- 入力 -->
  <div id="inputView" class="card hidden">
    <p>休みたい日を選択</p>
    <div id="calendar" class="calendar"></div>

    <div id="selected"></div>

    <textarea id="note" placeholder="備考"></textarea>

    <button class="btn btnPrimary" onclick="submitShift()">送信</button>
    <div id="error"></div>
  </div>

  <!-- 確認 -->
  <div id="viewView" class="card hidden">
    <div class="success">送信が完了しました</div>

    <div id="dates"></div>
    <div id="noteView"></div>

    <button class="btn btnSub" onclick="edit()">変更する</button>
  </div>

</div>

<script>
const API = '/api/shift';

let state = {
  userId: 'demo-user-001',
  selected: [],
  submitted: null
};

function show(id){
  ['bindView','inputView','viewView'].forEach(v=>{
    document.getElementById(v).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

async function init(){
  const res = await fetch(API+'?action=bootstrap&userId='+state.userId);
  const json = await res.json();

  if(json.data.mode === 'bind'){
    show('bindView');
    return;
  }

  if(json.data.submitted){
    renderView(json.data.submitted);
  }else{
    buildCalendar();
    show('inputView');
  }
}

function buildCalendar(){
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  for(let i=1;i<=31;i++){
    const d = document.createElement('div');
    d.className='day';
    d.innerText=i;

    d.onclick=()=>{
      if(state.selected.includes(i)){
        state.selected = state.selected.filter(v=>v!==i);
      }else{
        state.selected.push(i);
      }
      renderSelected();
      buildCalendar();
    };

    if(state.selected.includes(i)) d.classList.add('selected');

    cal.appendChild(d);
  }
}

function renderSelected(){
  const el = document.getElementById('selected');
  el.innerHTML='';
  state.selected.forEach(d=>{
    el.innerHTML += '<span class="chip">'+d+'日</span>';
  });
}

async function submitShift(){
  const res = await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      action:'submitShift',
      userId:state.userId,
      selectedDates:state.selected,
      note:document.getElementById('note').value,
      targetMonth:'test'
    })
  });

  const json = await res.json();

  if(json.ok){
    renderView(json.submitted);
  }
}

function renderView(data){
  state.submitted = data;

  document.getElementById('dates').innerHTML =
    data.selectedDates.map(d=>'<span class="chip">'+d+'日</span>').join('');

  document.getElementById('noteView').innerText = data.note || '';

  show('viewView');
}

function edit(){
  state.selected = state.submitted.selectedDates;
  document.getElementById('note').value = state.submitted.note;
  buildCalendar();
  renderSelected();
  show('inputView');
}

async function bind(){
  const res = await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      action:'bindDriver',
      userId:state.userId,
      name:document.getElementById('bindName').value,
      pin:document.getElementById('bindPin').value
    })
  });

  const json = await res.json();
  if(json.ok){
    init();
  }
}

init();
</script>
</body>
</html>
