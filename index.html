<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シフト希望</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f7f5;
      color: #222;
    }

    .wrap {
      max-width: 480px;
      margin: auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 6px;
      margin-top: 12px;
    }

    .day {
      padding: 12px;
      text-align: center;
      border-radius: 10px;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    .selected {
      background: #ffd65e;
      font-weight: bold;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      margin-top: 16px;
      background: #111;
      color: #fff;
    }

    .chip {
      display: inline-block;
      padding: 6px 10px;
      margin: 4px;
      border-radius: 20px;
      background: #fff6d9;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>シフト希望</h1>

  <!-- 入力 -->
  <div id="input" class="card">
    <p>休みたい日を選択</p>
    <div id="calendar" class="calendar"></div>

    <div id="selected"></div>

    <textarea id="note" placeholder="備考" style="margin-top:10px;"></textarea>

    <button class="btn" onclick="submit()">送信</button>
  </div>

  <!-- 確認 -->
  <div id="view" class="card hidden">
    <p>送信完了</p>
    <div id="viewDates"></div>
    <div id="viewNote"></div>

    <button class="btn" onclick="edit()">変更する</button>
  </div>
</div>

<script>
const API = '/api/shift';

let selected = [];

function build(){
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  for(let i=1;i<=31;i++){
    const d = document.createElement('div');
    d.className='day';
    d.innerText=i;

    d.onclick=()=>{
      if(selected.includes(i)){
        selected = selected.filter(v=>v!==i);
      }else{
        selected.push(i);
      }
      render();
    };

    if(selected.includes(i)) d.classList.add('selected');

    cal.appendChild(d);
  }
}

function render(){
  build();
  const el = document.getElementById('selected');
  el.innerHTML='';
  selected.forEach(d=>{
    el.innerHTML += '<span class="chip">'+d+'日</span>';
  });
}

async function submit(){
  const res = await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      action:'submitShift',
      userId:'demo-user-001',
      selectedDates:selected,
      note:document.getElementById('note').value,
      targetMonth:'test'
    })
  });

  const json = await res.json();

  if(json.ok){
    document.getElementById('input').classList.add('hidden');
    document.getElementById('view').classList.remove('hidden');

    document.getElementById('viewDates').innerHTML =
      selected.map(d=>'<span class="chip">'+d+'日</span>').join('');

    document.getElementById('viewNote').innerText =
      document.getElementById('note').value;
  }
}

function edit(){
  document.getElementById('input').classList.remove('hidden');
  document.getElementById('view').classList.add('hidden');
}

build();
</script>
</body>
</html>
