<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>シフト希望</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-b from-yellow-50 to-stone-100 text-stone-800">

<div class="max-w-md mx-auto p-4 pb-24">

  <!-- ヘッダー -->
  <div class="bg-black text-white rounded-3xl p-6 shadow-2xl mb-4">
    <div class="text-xs text-yellow-300 mb-2">シフト希望</div>
    <h1 class="text-2xl font-bold">シフト提出</h1>
    <p class="text-sm text-white/60">休みたい日を選択してください</p>
  </div>

  <!-- カード -->
  <div class="bg-white rounded-3xl shadow-xl p-4">

    <div class="mb-4">
      <div class="text-sm font-bold mb-2">カレンダー</div>
      <div id="calendar" class="grid grid-cols-7 gap-2"></div>
    </div>

    <div class="mb-4">
      <div class="text-sm font-bold mb-2">選択中</div>
      <div id="selected" class="flex flex-wrap gap-2 text-sm"></div>
    </div>

    <textarea id="note"
      class="w-full border rounded-xl p-3 mb-4"
      placeholder="備考（任意）"></textarea>

    <button onclick="submit()"
      class="w-full bg-black text-white py-3 rounded-xl font-bold">
      送信する
    </button>

  </div>

</div>

<script>
let selected = [];

function build(){
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  for(let i=1;i<=31;i++){
    const d = document.createElement('div');
    d.className = "p-3 text-center border rounded-xl cursor-pointer";

    if(selected.includes(i)){
      d.className += " bg-yellow-300 font-bold";
    }

    d.innerText = i;

    d.onclick = ()=>{
      if(selected.includes(i)){
        selected = selected.filter(v=>v!==i);
      }else{
        selected.push(i);
      }
      render();
    };

    cal.appendChild(d);
  }
}

function render(){
  build();

  const el = document.getElementById('selected');
  el.innerHTML = '';

  selected.forEach(d=>{
    el.innerHTML += `<div class="bg-yellow-100 px-2 py-1 rounded">${d}日</div>`;
  });
}

async function submit(){
  await fetch('/api/shift',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      action:'submitShift',
      userId:'demo-user-001',
      selectedDates:selected,
      note:document.getElementById('note').value,
      targetMonth:'test'
    })
  });

  alert("送信完了");
}

build();
</script>

</body>
</html>
